version: "3.8"

services:
  springboot-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-server -Xmx512m -XX:+UseG1GC
      - spring.application.name=springboot-app
      - server.port=8080
    container_name: springboot-app-container
    restart: unless-stopped
